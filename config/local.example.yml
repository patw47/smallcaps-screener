# config/local.example.yml — modèle de configuration locale.
#
# Copier vers config/local.yml (gitignoré) puis renseigner les vraies valeurs :
#   cp config/local.example.yml config/local.yml
#
# Chargé au démarrage du backend s'il existe ; sans fichier, les defaults NEUTRES
# du code s'appliquent (aucun titre ne qualifie en v4/v5, poids de scoring
# uniformes, bandeaux/glossaire v4-v5 vides). Trois sections autorisées :
# filters, v4, v5. Toute clé absente des defaults fait échouer le démarrage
# (protection typo — une faute de frappe ne doit jamais laisser silencieusement
# la valeur par défaut).
#
# Sur le VPS, poser REQUIRE_LOCAL_CONFIG=1 : le backend refuse alors de démarrer
# sans ce fichier (protège le live tracker de tourner en valeurs neutres).
#
# Les valeurs réelles v4/v5 sont GELÉES par les protocoles signés (archivés hors
# repo) : les recopier à l'identique, bit à bit. Les modifier = révision de
# protocole + remise à zéro du chrono forward.

# Surcharges de FILTERS (backend/screener_backend.py) — merge profond, clé par clé.
filters: {}
#   score_weights:        # poids réels du scoring (defaults du code : uniformes)
#     accumulation: 1
#     compression: 1
#     near_pivot: 1
#     low_ext: 1
#     rs_turning: 1
#     above_ma: 1
#     insider: 1
#     cash: 1
#     revenue: 1
#     low_float: 1
#     short: 1

# Constantes gelées du protocole v4 + affichage (bandeau/glossaire servis à l'UI).
