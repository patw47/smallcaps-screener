services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
      - ./config:/app/config
    environment:
      - SCAN_EVERY_HOURS=${SCAN_EVERY_HOURS:-24}
      - SCAN_TRADING_DAYS_ONLY=${SCAN_TRADING_DAYS_ONLY:-true}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - EDGAR_USER_AGENT=${EDGAR_USER_AGENT:-}
      - REQUIRE_LOCAL_CONFIG=${REQUIRE_LOCAL_CONFIG:-}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - backend
    restart: always

volumes:
  data:
